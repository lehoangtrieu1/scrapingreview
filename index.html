<script>
  function init() {
    const container = document.getElementById("reviews");

    try {
      const dummyMapDiv = document.createElement("div");
      const map = new google.maps.Map(dummyMapDiv);
      const service = new google.maps.places.PlacesService(map);

      const placeId = "ChIJ0YJiiW-rMioRjoA8YxBVKGk";

      service.getDetails(
        {
          placeId: placeId,
          fields: ["name", "rating", "reviews"]
        },
        (place, status) => {
          container.innerHTML = "";

          if (status !== google.maps.places.PlacesServiceStatus.OK) {
            container.innerHTML = "<div style='color:red;font-size:24px'>Google error: " + status + "</div>";
            return;
          }

          if (!place || !place.reviews || place.reviews.length === 0) {
            container.innerHTML = "<div style='color:orange;font-size:24px'>No reviews found.</div>";
            return;
          }

          const topReviews = place.reviews.slice(0, 4);

          container.innerHTML = topReviews.map(r => `
            <div class="card">
              <div class="author">${r.author_name || "Anonymous"}</div>
              <div class="rating">⭐ ${r.rating || "-"}/5</div>
              <div class="text">${r.text || "No text"}</div>
            </div>
          `).join("");
        }
      );
    } catch (err) {
      container.innerHTML = "<div style='color:red;font-size:24px'>Script error: " + err.message + "</div>";
    }
  }
</script>
